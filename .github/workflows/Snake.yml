name: Generate Snake Animation

on:
  # Se régénère automatiquement toutes les 12h
  schedule:
    - cron: "0 */12 * * *"
  # Se lance aussi à chaque push sur main
  push:
    branches:
      - main
  # Bouton manuel dans l'onglet Actions
  workflow_dispatch:

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake game
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?color_snake=#00D9FF&color_dots=#161b22,#0e4429,#006d32,#26a641,#39d353&color_bkg=#0d1117

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}